<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math - SchoolHelper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            line-height: 1.6;
        }
        h1 { font-size: 2.8rem; margin-bottom: 20px; }
        .content {
            max-width: 900px;
            margin: 40px auto;
            text-align: left;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
        }
        img {
            max-width: 100%;
            border-radius: 12px;
            margin: 15px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .download-btn {
            display: inline-block;
            padding: 12px 25px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
        }
        .download-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Mathematics 📐</h1>
    
    <div class="content">
        <h2>Math Diagrams & Resources</h2>
        <p>Here are some useful math images. You can download them!</p>

        <!-- Pythagorean Theorem -->
        <h3>Pythagorean Theorem</h3>
        <img src="images/pythagorean.png" alt="Pythagorean Theorem Diagram">
